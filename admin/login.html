<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ABRIT GLASS</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f7;
      color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .login-brand span { color: #555; }
    .login-subtitle {
      font-size: 13px;
      color: #8a8a9a;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }
    .login-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    }
    .login-container h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #111;
      margin-bottom: 8px;
    }
    .login-container p {
      font-size: 14px;
      color: #8a8a9a;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #6a6a7a;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #f5f5f7;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 6px;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: rgba(0,0,0,0.25);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
      background: #fff;
    }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #111111;
      color: #fff;
      border: 2px solid #111111;
      border-radius: 6px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.3px;
    }
    button[type="submit"]:hover {
      background: transparent;
      color: #111111;
    }
    .error {
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 6px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #8a8a9a;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #111; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <div class="login-brand">ABRIT <span>GLASS</span></div>
      <div class="login-subtitle">Admin Portal</div>
    </div>
    <div class="login-container">
      <h2>Welcome back</h2>
      <p>Sign in to manage your site content.</p>
      <div class="error" id="error-msg">Invalid credentials. Please try again.</div>
      <form action="/admin-login" method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit">Sign In</button>
      </form>
    </div>
    <a href="/" class="back-link">← Back to website</a>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
